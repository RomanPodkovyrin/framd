<div th:fragment="grid" xmlns:th="http://www.thymeleaf.org">
    <div th:if="${#lists.isEmpty(images)}" class="empty-state">
        <svg aria-hidden="true" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>No photos yet.</p>
    </div>
    <div th:unless="${#lists.isEmpty(images)}" class="photo-grid">
        <a th:each="media : ${images}"
           th:href="@{/preview/{hash}(hash=${media.hash})}"
           class="photo-card">
            <img th:src="@{/preview/{hash}(hash=${media.hash})}"
                 th:alt="${media.name}"
                 loading="lazy">
            <div class="photo-detail" hidden>
                <div class="detail-row" th:with="filename=${media.name + (media.extension != '' ? '.' + media.extension : '')}">
                    <span class="detail-label">File</span><span th:text="${filename}"></span>
                </div>
                <div class="detail-row" th:if="${media.width != null and media.height != null}">
                    <span class="detail-label">Resolution</span><span th:text="${media.width + ' x ' + media.height}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Size</span>
                    <span th:text="${media.sizeInBytes >= 1048576 ? #numbers.formatDecimal(media.sizeInBytes / 1048576.0, 1, 1) + ' MB' : #numbers.formatDecimal(media.sizeInBytes / 1024.0, 1, 0) + ' KB'}"></span>
                </div>
                <div class="detail-row" th:if="${media.captureTime != null}">
                    <span class="detail-label">Captured</span><span th:text="${#temporals.format(media.captureTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
                <div class="detail-row" th:if="${media.lastModifiedTime != null}">
                    <span class="detail-label">Modified</span><span th:text="${#temporals.format(media.lastModifiedTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
                <div class="detail-row" th:if="${media.lastIndexedTime != null}">
                    <span class="detail-label">Indexed</span><span th:text="${#temporals.format(media.lastIndexedTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Path</span><span th:text="${media.path}"></span>
                </div>
            </div>
        </a>
    </div>
</div>
