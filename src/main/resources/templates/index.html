<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Framd')}"></head>
<body>

<header th:replace="~{fragments :: header('gallery')}"></header>

<div class="gallery-preview">
    <div class="section-label">Recent</div>
    <div id="gallery" hx-get="/gallery" hx-trigger="load"></div>
</div>

<aside id="info-panel">
    <p class="panel-placeholder">Select a photo</p>
    <img id="panel-img" src="" alt="" hidden>
    <div id="panel-content"></div>
</aside>

<div id="lightbox">
    <img id="lightbox-img" src="" alt="">
</div>

<footer th:replace="~{fragments :: footer('local gallery')}"></footer>

<script>
    const panelImg = document.getElementById('panel-img');
    const panelContent = document.getElementById('panel-content');
    const panelPlaceholder = document.querySelector('.panel-placeholder');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentIndex = -1;

    function getCards() {
        return Array.from(document.querySelectorAll('.photo-card'));
    }

    function selectCard(index) {
        const cards = getCards();
        if (index < 0 || index >= cards.length) return;
        currentIndex = index;
        const card = cards[index];
        panelImg.src = card.href;
        panelImg.hidden = false;
        panelPlaceholder.hidden = true;
        const detail = card.querySelector('.photo-detail');
        panelContent.innerHTML = detail ? detail.innerHTML : '';
    }

    document.addEventListener('click', e => {
        const card = e.target.closest('.photo-card');
        if (!card) return;
        e.preventDefault();
        selectCard(getCards().indexOf(card));
    });

    panelImg.addEventListener('click', () => {
        lightboxImg.src = panelImg.src;
        lightbox.classList.add('open');
    });

    lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

    document.addEventListener('keydown', e => {
        if (lightbox.classList.contains('open')) {
            if (e.key === 'Escape') lightbox.classList.remove('open');
            return;
        }
        if (e.key === 'ArrowRight') selectCard(currentIndex + 1);
        if (e.key === 'ArrowLeft') selectCard(currentIndex - 1);
    });
</script>
</body>
</html>
