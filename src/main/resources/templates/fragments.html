<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Framd</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}" />
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}" />
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
            integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
            crossorigin="anonymous"></script>
    <script>
        document.addEventListener('htmx:configRequest', function(event) {
            const csrf = document.querySelector('meta[name="_csrf"]');
            if (csrf) event.detail.headers['X-CSRF-TOKEN'] = csrf.content;
        });
    </script>
</head>

<header th:fragment="header(page)">
    <a href="/" class="logo">Framd</a>
    <nav>
        <a th:if="${page == 'admin'}" href="/" class="nav-link nav-control">Gallery</a>
        <span class="scan-badge nav-control"
              hx-get="/scan/status"
              hx-trigger="load, every 5s"
              hx-swap="innerHTML">
            <span class="scan-dot"></span>
            <span class="scan-label">Idle</span>
        </span>
        <button class="scan-btn nav-control" hx-post="/scan" hx-swap="none">Scan</button>
        <a th:if="${page == 'gallery'}" href="/frame" class="nav-link nav-control">Frame</a>
        <a th:if="${page == 'gallery'}" href="/admin" class="nav-link nav-control">Admin</a>
    </nav>
</header>

<th:block th:fragment="scan-status(status)">
    <span th:classappend="${status.scanning} ? 'scan-dot--active'" class="scan-dot"></span>
    <span th:classappend="${status.scanning} ? 'scan-label--active'" class="scan-label"
          th:text="${status.scanning} ? 'Scanning' : 'Idle'"></span>
    <span th:if="${status.scanning}" class="scan-detail"
          th:text="${status.processed + ' / ' + status.total}"></span>
</th:block>

<footer th:fragment="footer(label)">
    <span th:text="'Framd - ' + ${label}">Framd</span>
    <span hx-get="/photo-count" hx-trigger="load, every 15s" hx-swap="innerHTML"></span>
</footer>

</html>
