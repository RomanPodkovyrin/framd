<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Framd</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #e8e8e8;
            --text-muted: #888;
            --accent: #c8a96e;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .mode-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: #0f0f0f;
            font-weight: 600;
        }

        .mode-btn:not(.active):hover {
            color: var(--text);
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .gallery-preview {
            flex: 1;
            padding: 2rem 3rem 3rem;
        }

        .section-label {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state svg {
            display: block;
            margin: 0 auto 1rem;
            opacity: 0.15;
        }

        footer {
            padding: 1.5rem 3rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer span {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">Framd</a>
        <nav>
            <div class="mode-toggle">
                <button class="mode-btn active">Gallery</button>
                <button class="mode-btn">Frame</button>
            </div>
            <a href="/admin" class="nav-link">Admin</a>
        </nav>
    </header>

    <div class="gallery-preview">
        <div class="section-label">Recent</div>

        <div class="empty-state">
            <svg aria-hidden="true" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p>No photos yet.</p>
        </div>
    </div>

    <footer>
        <span>Framd &mdash; local gallery</span>
        <span>0 photos</span>
    </footer>

    <script>
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
